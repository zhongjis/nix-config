name: Update Helium package

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-helium
  cancel-in-progress: false

jobs:
  update:
    name: Check Helium release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update package file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix shell nixpkgs#alejandra nixpkgs#curl nixpkgs#jq nixpkgs#python3 -c scripts/update-helium-package.sh

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify changed files
        if: steps.diff.outputs.changed == 'true'
        run: |
          changed_files="$(git diff --name-only)"
          if [[ "$changed_files" != "packages/helium.nix" ]]; then
            echo "Unexpected changed files:" >&2
            echo "$changed_files" >&2
            exit 1
          fi

      - name: Build Helium
        if: steps.diff.outputs.changed == 'true'
        run: nix build .#helium --no-link

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-helium
          delete-branch: true
          commit-message: "chore(helium): update package"
          title: "chore(helium): update package"
          body: |
            Automated daily Helium package update.

            Verification:
            - `nix build .#helium --no-link`
