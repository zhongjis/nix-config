name: Update custom packages

# Single generic updater for every custom package under packages/.
# Packages opt in by setting `updatable = true` in packages/registry.nix and
# declaring `passthru.updateScript` in their derivation. Adding a new tracked
# package requires NO change to this workflow.

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  discover:
    name: Discover updatable packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: List updatable packages
        id: list
        run: |
          # shellcheck disable=SC2016  # ${n} is Nix interpolation, expanded by Nix, not the shell
          packages="$(nix eval --impure --json --expr \
            'let r = import ./packages/registry.nix; in builtins.filter (n: r.${n}.updatable or false) (builtins.attrNames r)')"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  update:
    name: Update ${{ matrix.package }}
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    concurrency:
      group: update-${{ matrix.package }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          # nix-update --use-update-script builds each package's updateScript via
          # an impure `with import <nixpkgs> {}` expr, which needs <nixpkgs> in the
          # search path. Map it to the flake registry entry (no legacy channel).
          nix_path: nixpkgs=flake:nixpkgs

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pkg='${{ matrix.package }}'
          # Packages flagged `selfUpdateScript` ship a self-contained launcher.
          # nix-update's read-only metadata eval forces `cargoDeps.outputHash`,
          # which triggers IFD on bun2nix's vendored deps and crashes with
          # "path is not valid". Such scripts need nix-update for nothing, so
          # build the updateScript directly (`nix build` allows IFD) and exec it.
          self="$(nix eval --impure --json --expr \
            "(import ./packages/registry.nix).\"$pkg\".selfUpdateScript or false")"
          if [ "$self" = "true" ]; then
            expr="(builtins.getFlake (toString ./.)).packages.\${builtins.currentSystem}.\"$pkg\".passthru.updateScript"
            # `nix build` of the getExe string itself fails (output subpath), so
            # build its store root: dirOf (dirOf "\${drv}/bin/<name>") == "\${drv}".
            nix build --impure --no-link --expr "builtins.dirOf (builtins.dirOf $expr)"
            exe="$(nix eval --raw --impure --expr "$expr")"
            "$exe"
          else
            nix run nixpkgs#nix-update -- --flake --use-update-script "$pkg"
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build updated package
        if: steps.diff.outputs.changed == 'true'
        run: nix build ".#${{ matrix.package }}" --no-link

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-${{ matrix.package }}
          delete-branch: true
          commit-message: "chore(${{ matrix.package }}): update package"
          title: "chore(${{ matrix.package }}): update package"
          body: |
            Automated package update for `${{ matrix.package }}`.

            Generated by `nix-update --flake --use-update-script ${{ matrix.package }}`
            and verified with `nix build .#${{ matrix.package }} --no-link`.

            Checklist:
            - [ ] Review `packages/context-mode/` when update touches context-mode packaging.
