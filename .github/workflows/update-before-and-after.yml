name: Update before-and-after package

on:
  schedule:
    - cron: "37 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-before-and-after
  cancel-in-progress: false

jobs:
  update:
    name: Check before-and-after package and skill
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update package and skill files
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          old_version="$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('packages/before-and-after.nix').read_text(encoding='utf-8')
          print(re.search(r'^\s*version = "([^"]+)";', text, re.M).group(1))
          PY
          )"
          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          nix shell \
            nixpkgs#alejandra \
            nixpkgs#curl \
            nixpkgs#git \
            nixpkgs#jq \
            nixpkgs#python3 \
            -c scripts/update-before-and-after-package.sh
          new_version="$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('packages/before-and-after.nix').read_text(encoding='utf-8')
          print(re.search(r'^\s*version = "([^"]+)";', text, re.M).group(1))
          PY
          )"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify changed files
        if: steps.diff.outputs.changed == 'true'
        run: |
          unexpected_files=""
          while IFS= read -r file; do
            case "$file" in
              packages/before-and-after.nix) ;;
              modules/home-manager/features/ai-tools/common/skills/personal/before-and-after/*) ;;
              *) unexpected_files+="$file"$'\n' ;;
            esac
          done < <(git diff --name-only)
          if [[ -n "$unexpected_files" ]]; then
            echo "Unexpected changed files:" >&2
            echo "$unexpected_files" >&2
            exit 1
          fi

      - name: Build package
        if: steps.diff.outputs.changed == 'true'
        run: |
          out="$(nix build .#before-and-after --no-link --print-out-paths)"
          test -x "$out/bin/before-and-after"
          test -f "$out/lib/node_modules/@vercel/before-and-after/dist/bin/cli.js"
          "$out/bin/before-and-after" --help

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-before-and-after
          delete-branch: true
          commit-message: "chore(before-and-after): update package and skill"
          title: "chore(before-and-after): update package and skill"
          body: |
            Automated daily before-and-after package and skill update.

            Version: `${{ steps.update.outputs.old_version }}` → `${{ steps.update.outputs.new_version }}`

            Verification:
            - `nix build .#before-and-after --no-link --print-out-paths`
            - output contains `bin/before-and-after` and `dist/bin/cli.js`
            - `before-and-after --help`
